site_name: xlmtec
site_url: https://Abdur-azure.github.io/xlmtec
repo_url: https://github.com/Abdur-azure/xlmtec
repo_name: xlmtec

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - content.code.copy
  palette:
    scheme: default

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite
  - footnotes
  - tables

plugins:
  - search

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Configuration: configuration.md

  - Commands:
    - AI Suggest: ai_integrations.md
    - Model Hub: hub.md
    - Config Templates: template.md
    - Checkpoint Resume: resume.md
    - Evaluation Dashboard: dashboard.md
    - Export Formats: export.md
    - Batch Inference: predict.md
    - Plugin System: plugin.md
    - TUI: tui.md

  - Reference:
    - API: api.md
    - Examples: examples.md
    - Troubleshooting: troubleshooting.md