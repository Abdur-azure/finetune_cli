name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit + Integration tests ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # don't cancel sibling jobs when one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ml,tui,dev]"

      # Each flag on its own line MUST end with \ for shell continuation.
      # Without \, each line is a separate command and --ignore= fails as
      # an unknown shell command (exit 127 / pytest exit 2).
      - name: Run unit tests (no GPU required)
        run: |
          pytest tests/ -v \
            --ignore=tests/test_integration.py \
            --timeout=60 \
            --cov=finetune_cli \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Run integration tests (CPU, real GPT-2)
        run: pytest tests/test_integration.py -v -s --timeout=600
        env:
          FINETUNE_CI: "1"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Lint + type-check ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install package so ruff resolves all intra-package imports cleanly.
      # [dev] only — no torch needed for static analysis.
      - name: Install package and lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint check
        run: ruff check .

      - name: Type check (non-blocking)
        run: mypy finetune_cli/core/ finetune_cli/trainers/ --ignore-missing-imports || true