name: Bug Report
description: Report a bug in xlmtec
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in **xlmtec**.
        Fill in as much detail as possible to help us reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: xlmtec version
      description: Run `xlmtec --version` to find this
      placeholder: "3.28.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: training_method
    attributes:
      label: Training method (if applicable)
      options:
        - lora
        - qlora
        - full_finetuning
        - instruction_tuning
        - dpo
        - vanilla_distillation
        - feature_distillation
        - structured_pruning
        - sweep
        - predict
        - export
        - N/A
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal config file, command, and dataset snippet if possible
      placeholder: |
        1. Run `xlmtec train --config config.yaml`
        2. See error at step X
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Config file (if relevant)
      render: yaml
    validations:
      required: false